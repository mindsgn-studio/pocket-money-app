plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

repositories {
  flatDir {
    dirs 'src/libs'
  }
}

group = 'pocket.module.mindsgn'
version = '0.7.9'

android {
  namespace "pocket.module.mindsgn"
  defaultConfig {
    versionCode 1
    versionName "0.7.9"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation(name: 'core', ext: 'aar')
  implementation 'androidx.security:security-crypto:1.1.0-alpha06'
  testImplementation 'junit:junit:4.13.2'
}
